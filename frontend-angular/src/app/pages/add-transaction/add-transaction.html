<div class="page-header">
    <h1>Add Transaction</h1>
</div>

<div class="card" style="max-width: 500px">
    @if (error()) {
        <div class="error">{{ error() }}</div>
    }
    <form (ngSubmit)="save()" #f="ngForm">
        <div class="form-group">
            <label>Description</label>
            <input type="text" [(ngModel)]="form.description"
                name="description" required />
        </div>
        <div class="form-group">
            <label>Amount</label>
            <input type="number" step="0.01" [(ngModel)]="form.amount"
                name="amount" required />
        </div>
        <div class="form-group">
            <label>Type</label>
            <select [(ngModel)]="form.type" name="type">
                <option [value]="0">Income</option>
                <option [value]="1">Expense</option>
            </select>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select [(ngModel)]="form.categoryId" name="categoryId" required>
                <option [value]="null">Select a category</option>
                @for (cat of categories(); track cat.id) {
                    <option [value]="cat.id">{{ cat.name }}</option>
                }
            </select>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" [(ngModel)]="form.date" name="date" required />
        </div>
        <div class="btn-group">
            <button type="button" class="btn-secondary"
                routerLink="/">Cancel</button>
                
            <button type="submit" [disabled]="saving() || f.invalid">
                {{ saving() ? 'Saving...' : 'Save Transaction' }}
            </button>            
        </div>
    </form>
</div>
